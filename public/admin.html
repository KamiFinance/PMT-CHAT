<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PMT Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.07);
    --accent: #faff63;
    --accent2: #63ffb4;
    --text: #e8e8f0;
    --muted: rgba(232,232,240,0.45);
    --danger: #ff5252;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(250,255,99,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(250,255,99,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Login Screen ── */
  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    background: var(--bg);
  }

  .login-box {
    width: 380px;
    padding: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    position: relative;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px;
    height: 2px;
    background: var(--accent);
    border-radius: 0 0 2px 2px;
  }

  .login-logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 32px;
  }

  .login-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .login-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 36px;
    line-height: 1.5;
  }

  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .field-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .15s;
  }
  .field-input:focus { border-color: var(--accent); }

  .btn-login {
    width: 100%;
    margin-top: 24px;
    padding: 13px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn-login:hover { opacity: .88; }
  .btn-login:active { transform: scale(.98); }

  .login-error {
    margin-top: 14px;
    font-size: 12px;
    color: var(--danger);
    font-family: var(--mono);
    text-align: center;
    height: 16px;
  }

  /* ── Dashboard ── */
  #dashboard { display: none; position: relative; z-index: 1; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,15,.92);
    backdrop-filter: blur(12px);
    z-index: 5;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .brand-dot {
    width: 8px; height: 8px;
    background: var(--accent2);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.6; transform:scale(.8); }
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .btn-refresh {
    padding: 7px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  .btn-logout {
    padding: 7px 16px;
    background: transparent;
    border: 1px solid rgba(255,82,82,.3);
    border-radius: 3px;
    color: var(--danger);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-logout:hover { background: rgba(255,82,82,.1); }

  /* Stats Row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat-card {
    background: var(--bg);
    padding: 32px 40px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 40px;
    width: 40px; height: 1px;
    background: var(--accent);
    opacity: .6;
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 42px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--accent);
    line-height: 1;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* Table */
  .table-wrap {
    padding: 40px;
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .table-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .search-box {
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 14px;
    outline: none;
    width: 240px;
    transition: border-color .15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: rgba(232,232,240,.25); }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 0 16px 14px;
    border-bottom: 1px solid var(--border);
  }

  thead th:first-child { padding-left: 0; }

  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,.04);
    transition: background .1s;
    cursor: default;
  }
  tbody tr:hover { background: rgba(255,255,255,.025); }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 16px;
    font-size: 13px;
    vertical-align: middle;
  }
  tbody td:first-child { padding-left: 0; }

  .td-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    width: 40px;
  }

  .td-user {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: #0a0a0f;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .username { font-weight: 500; }
  .user-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .td-addr {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .addr-full {
    display: none;
    font-size: 11px;
  }

  .addr-short { cursor: pointer; }
  .addr-short:hover { color: var(--accent2); }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .badge-yes { background: rgba(99,255,180,.12); color: var(--accent2); }
  .badge-no  { background: rgba(255,255,255,.05); color: var(--muted); }

  /* Copy toast */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    z-index: 99;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 80px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    gap: 12px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(250,255,99,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-msg {
    padding: 40px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--danger);
    text-align: center;
  }

  #fetch-time { font-size: 10px; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⬡ PMT Chain</div>
    <div class="login-title">Admin Dashboard</div>
    <div class="login-sub">Restricted access. Enter your admin secret key to continue.</div>
    <div class="field-label">Admin Secret Key</div>
    <input type="password" class="field-input" id="secret-input" placeholder="Enter secret key…" autocomplete="off">
    <button class="btn-login" onclick="doLogin()">Access Dashboard →</button>
    <div class="login-error" id="login-err"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      PMT Admin
    </div>
    <div class="topbar-right">
      <span id="fetch-time"></span>
      <button class="btn-refresh" onclick="loadUsers()">↻ Refresh</button>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-sub">registered accounts</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">With Backup</div>
      <div class="stat-value" id="stat-backup">—</div>
      <div class="stat-sub">cloud backup active</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Without Backup</div>
      <div class="stat-value" id="stat-nobackup">—</div>
      <div class="stat-sub">local only</div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title">User Registry</div>
      <input type="text" class="search-box" id="search" placeholder="Search username or address…" oninput="filterTable()">
    </div>
    <div id="table-container">
      <div class="loading"><div class="spinner"></div> Loading users…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Address copied</div>

<script>
  let adminKey = '';
  let allUsers = [];

  function doLogin() {
    const val = document.getElementById('secret-input').value.trim();
    if (!val) { document.getElementById('login-err').textContent = 'Please enter the secret key.'; return; }
    adminKey = val;
    document.getElementById('login-err').textContent = '';
    loadUsers();
  }

  document.getElementById('secret-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function logout() {
    adminKey = '';
    allUsers = [];
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('secret-input').value = '';
  }

  async function loadUsers() {
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('table-container').innerHTML = '<div class="loading"><div class="spinner"></div> Loading users…</div>';

    try {
      const res = await fetch('/api/admin', { headers: { 'X-Admin-Key': adminKey } });
      if (res.status === 401) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('login-err').textContent = 'Invalid secret key.';
        adminKey = '';
        return;
      }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      allUsers = data.users || [];

      // Update stats
      const withBackup = allUsers.filter(u => u.hasBackup).length;
      document.getElementById('stat-total').textContent = data.count;
      document.getElementById('stat-backup').textContent = withBackup;
      document.getElementById('stat-nobackup').textContent = data.count - withBackup;
      document.getElementById('fetch-time').textContent =
        'Last updated: ' + new Date(data.fetchedAt).toLocaleTimeString();

      renderTable(allUsers);
    } catch (e) {
      document.getElementById('table-container').innerHTML =
        `<div class="error-msg">Error: ${e.message}</div>`;
    }
  }

  function renderTable(users) {
    if (!users.length) {
      document.getElementById('table-container').innerHTML =
        '<div class="loading" style="color:var(--muted)">No users found.</div>';
      return;
    }

    const rows = users.map((u, i) => {
      const initials = (u.username || '?').slice(0, 2).toUpperCase();
      const addrShort = u.address && u.address !== '—'
        ? u.address.slice(0, 10) + '…' + u.address.slice(-6)
        : '—';
      const addrFull = u.address || '—';
      const backupBadge = u.hasBackup
        ? '<span class="badge badge-yes">✓ Active</span>'
        : '<span class="badge badge-no">— None</span>';

      return `
        <tr>
          <td class="td-num">${i + 1}</td>
          <td>
            <div class="td-user">
              <div class="avatar">${initials}</div>
              <div>
                <div class="username">${escHtml(u.username || '—')}</div>
              </div>
            </div>
          </td>
          <td class="td-addr">
            <span class="addr-short" title="${addrFull}" onclick="copyAddr('${addrFull}', this)">${addrShort}</span>
          </td>
          <td>${backupBadge}</td>
        </tr>`;
    }).join('');

    document.getElementById('table-container').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Username</th>
            <th>Wallet Address</th>
            <th>Cloud Backup</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allUsers.filter(u =>
      (u.username || '').toLowerCase().includes(q) ||
      (u.address  || '').toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  function copyAddr(addr, el) {
    if (addr === '—') return;
    navigator.clipboard.writeText(addr).then(() => {
      showToast('Address copied');
      el.style.color = 'var(--accent)';
      setTimeout(() => { el.style.color = ''; }, 1200);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
