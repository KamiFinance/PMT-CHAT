<!doctype html>
<html lang="en">
  <head>
    <!-- Force reload on new deployment (beats iOS PWA stale cache) -->
    <script>
      (function(){
        var v='2f6d43d';
        var s=localStorage.getItem('_pmt_v');
        if(s && s!==v){ localStorage.setItem('_pmt_v',v); location.reload(true); return; }
        localStorage.setItem('_pmt_v',v);
      })();
    </script>
    <meta charset="UTF-8" />
    <!-- Favicon + App Icons -->
    <link rel="icon" type="image/png" href="/pmt-logo.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Mobile optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="PMT-Chat" />
    <meta name="theme-color" content="#000000" />
    <meta name="msapplication-TileColor" content="#000000" />

    <!-- SEO -->
    <meta name="description" content="End-to-end encrypted decentralized messenger on PMT Chain. No servers. No surveillance." />
    <meta name="application-name" content="PMT-Chat" />

    <title>PMT-Chat</title>
    <!-- Force no-cache to prevent stale asset references after deployments -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- PWA: Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(reg => console.log('SW v5 registered'))
          .catch(err => console.warn('SW failed:', err));
        // Reload when SW updates so users always get fresh bundle
        navigator.serviceWorker.addEventListener('message', e => {
          if (e.data && e.data.type === 'SW_UPDATED') window.location.reload();
        });
      }
    </script>
  </body>
</html>
