/* -- Login Screen -- */
function LoginScreen({onLogin,onBack}){
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [err,setErr]=useState(null);
  const [loading,setLoading]=useState(false);

  // Check if there are saved accounts
  const savedAccounts=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('pmt_account_')){
      try{const a=JSON.parse(localStorage.getItem(k));if(a.username)savedAccounts.push(a);}catch{}
    }
  }

  const login=async()=>{
    if(!username.trim())return setErr('Enter your username');
    if(!password)return setErr('Enter your password');
    setLoading(true);setErr(null);
    try{
      const key='pmt_account_'+username.trim().toLowerCase();
      const stored=localStorage.getItem(key);
      if(!stored)return setErr('Account not found. Check your username or create a new wallet.');
      const account=JSON.parse(stored);
      const ok=await window.PMTAuth.verifyPassword(password,account.passwordHash,account.passwordSalt);
      if(!ok)return setErr('Incorrect password. Please try again.');
      // Decrypt wallet
      const walletData=await window.PMTAuth.decryptWallet(account.encryptedWallet,password);
      localStorage.setItem('pmt_session',JSON.stringify({username:account.username,address:account.address}));
      onLogin({address:walletData.address,privateKey:walletData.privateKey,
        balance:'0.0000',network:'PMT Chain',username:account.username});
    }catch(e){
      if(e.message?.includes('decrypt')||e.name==='OperationError')
        setErr('Incorrect password.');
      else setErr('Login failed: '+e.message);
    }finally{setLoading(false);}
  };

  return(
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
      background:'var(--bg)',padding:20}}>
      <div style={{width:'100%',maxWidth:400,background:'var(--panel)',border:'1px solid var(--border)',
        borderRadius:16,padding:'28px 28px 24px',display:'flex',flexDirection:'column',gap:18}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={onBack}
            style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,
              width:32,height:32,color:'var(--muted)',cursor:'pointer',fontSize:14,
              display:'flex',alignItems:'center',justifyContent:'center'}}>Back</button>
          <div style={{fontSize:18,fontWeight:600}}>Welcome back</div>
        </div>

        <button onClick={onBack}
          style={{padding:'11px',background:'#faff63',border:'none',borderRadius:9,
            color:'#000000',fontWeight:600,fontSize:13.5,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M16 12h2a2 2 0 0 1 0 4h-2v-4z"/><path d="M2 10h20"/></svg>
          Connect Wallet Instead
        </button>

        {savedAccounts.length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px'}}>YOUR ACCOUNTS</div>
            {savedAccounts.map(a=>(
              <button key={a.username} onClick={()=>setUsername(a.username)}
                style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',
                  background:username.toLowerCase()===a.username.toLowerCase()?'var(--surface2)':'var(--surface)',
                  border:'1px solid '+(username.toLowerCase()===a.username.toLowerCase()?'var(--accent)':'var(--border)'),
                  borderRadius:9,cursor:'pointer',textAlign:'left'}}>
                <div style={{width:32,height:32,borderRadius:'50%',background:'var(--accent)',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  color:'#0a0c14',fontWeight:700,fontSize:12,flexShrink:0}}>
                  {a.username.slice(0,2).toUpperCase()}
                </div>
                <div>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{a.username}</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)'}}>
                    {a.address.slice(0,8)}...{a.address.slice(-6)}
                  </div>
                </div>
              </button>
            ))}
          </div>
        )}

        <div>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px',marginBottom:5}}>USERNAME</div>
          <input placeholder="Your username" value={username}
            onChange={e=>{setUsername(e.target.value);setErr(null);}}
            onKeyDown={e=>e.key==='Enter'&&login()}
            style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',
              borderRadius:9,padding:'10px 13px',color:'var(--text)',fontFamily:'var(--sans)',fontSize:14,outline:'none'}}/>
        </div>
        <div>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px',marginBottom:5}}>PASSWORD</div>
          <input type="password" placeholder="password" value={password}
            onChange={e=>{setPassword(e.target.value);setErr(null);}}
            onKeyDown={e=>e.key==='Enter'&&login()}
            style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',
              borderRadius:9,padding:'10px 13px',color:'var(--text)',fontFamily:'var(--sans)',fontSize:14,outline:'none'}}/>
        </div>
        {err&&(
          <div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',
            borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--danger)'}}>{err}</div>
        )}
        <button onClick={login} disabled={loading||!username||!password}
          style={{padding:'13px',background:'var(--accent)',border:'none',borderRadius:10,
            color:'#0a0c14',fontWeight:600,fontSize:14,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8,
            opacity:loading||!username||!password?0.7:1}}>
          {loading
            ?<><span style={{width:14,height:14,border:'2px solid rgba(0,0,0,.3)',borderTopColor:'#0a0c14',
                borderRadius:'50%',display:'inline-block',animation:'spin .7s linear infinite'}}/>Unlocking...</>
            :'Log In'}
        </button>
        <div style={{textAlign:'center',fontSize:11,color:'var(--muted)',lineHeight:1.6}}>
          Forgot your password? Import your wallet using your seed phrase.
        </div>
      </div>
    </div>
  );
}

/* ── Landing ── */
function Landing({onDemo,onMetaMask,onCreateWallet,onImportWallet,onLogin}){
  const [connecting,setConnecting]=useState(false);
  const [err,setErr]=useState(null);
  const [hasProvider,setHasProvider]=useState(!!window.ethereum);

  useEffect(()=>{
    if(window.ethereum){setHasProvider(true);return;}
    const onInit=()=>setHasProvider(true);
    window.addEventListener('ethereum#initialized',onInit,{once:true});
    const check=setInterval(()=>{if(window.ethereum){setHasProvider(true);clearInterval(check);}},200);
    const timeout=setTimeout(()=>clearInterval(check),3000);
    return()=>{window.removeEventListener('ethereum#initialized',onInit);clearInterval(check);clearTimeout(timeout);};
  },[]);

  const getProvider=()=>{
    // EIP-6963: use announced providers (most reliable, bypasses TronLink hijack)
    if(window.__eip6963Providers?.length){
      const mm=window.__eip6963Providers.find(p=>p.info?.name?.toLowerCase().includes('metamask'));
      if(mm)return mm.provider;
      return window.__eip6963Providers[0].provider;
    }
    // Fallback: providers array (MetaMask + TronLink coexistence)
    if(window.ethereum?.providers?.length){
      const mm=window.ethereum.providers.find(p=>p.isMetaMask&&!p.isTronLink);
      if(mm)return mm;
      const other=window.ethereum.providers.find(p=>!p.isTronLink);
      if(other)return other;
    }
    // Single provider - skip TronLink
    if(window.ethereum&&!window.ethereum.isTronLink)return window.ethereum;
    return null;
  };

  const connectMM=async()=>{
    setErr(null);
    const provider=getProvider();
    if(!provider){
      if(window.ethereum?.isTronLink&&!window.ethereum?.providers?.find(p=>!p.isTronLink)){
        setErr('TronLink is blocking MetaMask. Please disable TronLink in chrome://extensions, then refresh.');
      } else {
        setErr('No Ethereum wallet detected. Please install MetaMask from metamask.io, then refresh.');
      }
      setHasProvider(false);
      return;
    }

    setConnecting(true);
    try{
      // Check if already authorized first (no popup), then request if needed
      let accounts=[];
      try{ accounts=await provider.request({method:'eth_accounts'}); }catch{}
      if(!accounts||!accounts.length){
        accounts=await provider.request({method:'eth_requestAccounts'});
      }

      if(!accounts||accounts.length===0)throw new Error('No accounts returned');
      const chainId=await provider.request({method:'eth_chainId'});
      const balHex=await provider.request({method:'eth_getBalance',params:[accounts[0],'latest']}).catch(()=>'0x0');
      const balEth=(parseInt(balHex,16)/1e18).toFixed(4);
      const netNames={'0x1':'Ethereum','0x5':'Goerli','0xaa36a7':'Sepolia','0x89':'Polygon','0xa':'Optimism','0xa4b1':'Arbitrum','0x46c52':'PMT Chain'};
      const netName=netNames[chainId]||('Chain '+parseInt(chainId,16));
      onMetaMask({address:accounts[0],balance:balEth,network:netName,chainId});
    }catch(e){
      const code=e.code;
      if(code===4001){
        setErr('Connection rejected. Please approve the connection in MetaMask.');
      } else if(code===-32002){
        setErr('MetaMask has a pending request. Click the MetaMask icon in your toolbar to approve it.');
      } else if(code===-32603||e.message==='Unexpected error'){
        // Internal error - usually means MetaMask needs to be reopened
        setErr('MetaMask encountered an error. Please open MetaMask, check for any pending requests, then try again.');
      } else {
        setErr('Connection failed: '+(e.message||String(e)));
      }
    }finally{setConnecting(false);}
  };



  // Listen for MetaMask account changes
  useEffect(()=>{
    if(!window.ethereum)return;
    const onAccounts=accs=>{
      if(accs&&accs.length>0){connectMM();}
    };
    window.ethereum.on('accountsChanged',onAccounts);
    return()=>window.ethereum.removeListener('accountsChanged',onAccounts);
  },[]);

  return(
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:20,overflowY:'auto'}}>
      <div style={{width:'100%',maxWidth:420,background:'var(--panel)',border:'1px solid var(--border)',
        borderRadius:16,padding:'28px 24px',display:'flex',flexDirection:'column',gap:16,overflowY:'auto',maxHeight:'95vh'}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <img src={window.PMT_LOGO} style={{width:52,height:52,borderRadius:14,objectFit:'cover',flexShrink:0}} alt="PMT"/>
          <div>
            <div style={{fontSize:22,fontWeight:600}}>PMT-Chat</div>
            <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--accent)',letterSpacing:'1.5px',marginTop:2}}>DECENTRALIZED MESSENGER</div>
          </div>
        </div>
        <p style={{fontSize:13.5,color:'var(--text2)',lineHeight:1.6}}>
          End-to-end encrypted messages stored on the blockchain. No servers. No surveillance. Own your conversations.
        </p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {[['+','E2E Encrypted','AES-256 + wallet keys'],['#','On-Chain','PMT Chain'],
            ['*','Self-Custody','Wallet = identity'],['+','Send PMT','Crypto in-chat']].map(([i,t,s])=>(
            <div key={t} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'10px 12px',
              background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10}}>
              <span style={{fontSize:16,flexShrink:0}}>{i}</span>
              <div>
                <div style={{fontSize:12,fontWeight:500}}>{t}</div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{s}</div>
              </div>
            </div>
          ))}
        </div>
        {err&&(
          <div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',
            borderRadius:10,padding:'10px 14px',fontSize:12.5,color:'var(--danger)',lineHeight:1.5}}>
            ! {err}
            {!hasProvider&&(
              <div style={{marginTop:8}}>
                <a href="https://metamask.io/download/" target="_blank" rel="noreferrer"
                  style={{color:'var(--accent)',fontWeight:500}}>Download MetaMask </a>
              </div>
            )}
          </div>
        )}


        <button onClick={connectMM} disabled={connecting}
          style={{padding:'13px 20px',
            background:connecting?'rgba(246,133,27,0.5)':'#faff63',
            border:'none',borderRadius:10,
            color:'#000000',fontWeight:600,fontSize:14,cursor:connecting?'default':'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:10,transition:'all .2s'}}>
          {connecting
            ? <><span style={{width:14,height:14,border:'2px solid rgba(255,255,255,.4)',
                borderTopColor:'#fff',borderRadius:'50%',display:'inline-block',
                animation:'spin .7s linear infinite'}}/>Approve in MetaMask...</>
            : <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M16 12h2a2 2 0 0 1 0 4h-2v-4z"/><path d="M2 10h20"/></svg>Connect Wallet</>}
        </button>

        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1,height:'1px',background:'var(--border)'}}/>
          <span style={{fontSize:11,color:'var(--muted)'}}>self-custody</span>
          <div style={{flex:1,height:'1px',background:'var(--border)'}}/>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <button onClick={onCreateWallet}
            style={{padding:'12px 10px',background:'var(--surface)',border:'1px solid var(--border)',
              borderRadius:10,color:'var(--text)',fontSize:13,cursor:'pointer',
              display:'flex',flexDirection:'column',alignItems:'center',gap:6,
              transition:'border-color .15s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)'}
            onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
            <span style={{fontSize:22,color:"var(--accent)"}}>+</span>
            <span style={{fontWeight:500}}>Create Wallet</span>
            <span style={{fontSize:10,color:'var(--muted)'}}>New self-custody wallet</span>
          </button>
          <button onClick={onImportWallet}
            style={{padding:'12px 10px',background:'var(--surface)',border:'1px solid var(--border)',
              borderRadius:10,color:'var(--text)',fontSize:13,cursor:'pointer',
              display:'flex',flexDirection:'column',alignItems:'center',gap:6,
              transition:'border-color .15s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent2)'}
            onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
            <span style={{fontSize:22}}>v</span>
            <span style={{fontWeight:500}}>Import Wallet</span>
            <span style={{fontSize:10,color:'var(--muted)'}}>Seed phrase or key</span>
          </button>
        </div>

        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1,height:'1px',background:'var(--border)'}}/>
          <span style={{fontSize:11,color:'var(--muted)'}}>or</span>
          <div style={{flex:1,height:'1px',background:'var(--border)'}}/>
        </div>

        <button onClick={onLogin}
          style={{padding:'11px 20px',background:'var(--surface2)',border:'1px solid var(--accent)',borderRadius:10,
            color:'var(--accent)',fontSize:13.5,fontWeight:500,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          Log In with Username
        </button>
        <button onClick={onDemo}
          style={{padding:'11px 20px',background:'transparent',border:'1px solid var(--border)',borderRadius:10,
            color:'var(--text2)',fontSize:13.5,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          Try Demo Mode (no wallet required)
        </button>
        <p style={{fontSize:11,color:'var(--muted)',textAlign:'center',lineHeight:1.5}}>
          Built on PMT Chain | React 18
        </p>
      </div>
    </div>
  );
}

/* ── Empty State ── */
function Empty({onNew}){
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      gap:14,padding:40,background:'var(--bg)'}}>
      <img src={window.PMT_LOGO} style={{width:72,height:72,borderRadius:'50%',objectFit:'cover'}} alt="PMT"/>
      <div style={{fontSize:20,fontWeight:600}}>Select a conversation</div>
      <div style={{fontSize:13.5,color:'var(--text2)'}}>All messages are end-to-end encrypted on PMT Chain</div>
      <button onClick={onNew}
        style={{marginTop:8,padding:'11px 28px',background:'var(--accent)',border:'none',borderRadius:10,
          color:'#0a0c14',fontWeight:600,fontSize:14,cursor:'pointer'}}>
        + New Chat
      </button>
    </div>
  );
}

/* ── App ── */
function App(){
  const [screen,setScreen]=useState('landing');
  const [wallet,setWallet]=useState(null);
  const [isDemo,setIsDemo]=useState(false);
  const [contacts,setContacts]=useState(CONTACTS.map(c=>({...c,preview:INIT_MSGS[c.address]?.slice(-1)[0]?.text||'...'})));
  const [msgs,setMsgs]=useState(INIT_MSGS);
  const [active,setActive]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [showProfile,setShowProfile]=useState(false);
  const [profile,setProfile]=useState({name:'',bio:'',avatarUrl:null,address:null});

  // Profile key is per-wallet-address
  const profileKey=wallet?.address
    ?'pmt_profile_'+wallet.address.toLowerCase()
    :'pmt_profile_demo';

  // Load profile whenever wallet changes
  useEffect(()=>{
    if(!wallet?.address&&!isDemo)return;
    try{
      const key=wallet?.address
        ?'pmt_profile_'+wallet.address.toLowerCase()
        :'pmt_profile_demo';
      const saved=localStorage.getItem(key);
      if(saved){
        setProfile(JSON.parse(saved));
      } else {
        // New wallet — start fresh profile
        setProfile({name:'',bio:'',avatarUrl:null,address:wallet?.address||null});
      }
    }catch{}
  },[wallet?.address, isDemo]);

  // Always keep address in sync
  useEffect(()=>{
    if(wallet?.address)setProfile(p=>({...p,address:wallet.address}));
  },[wallet?.address]);

  const handleLogout=useCallback(()=>{
    // Clear active session but keep account data
    try{
      localStorage.removeItem('pmt_session');
      // Also remove old-style wallet so MetaMask can reconnect cleanly
      localStorage.removeItem('pmt_wallet');
    }catch{}
    setWallet(null);
    setIsDemo(false);
    setActive(null);
    setProfile({name:'',bio:'',avatarUrl:null,address:null});
    setScreen('landing');
  },[]);

  const saveProfile=useCallback((updates)=>{
    setProfile(p=>{
      const next={...p,...updates,address:wallet?.address||p.address};
      try{
        const key=wallet?.address
          ?'pmt_profile_'+wallet.address.toLowerCase()
          :'pmt_profile_demo';
        localStorage.setItem(key,JSON.stringify(next));
      }catch{}
      return next;
    });
  },[wallet?.address]);

  // Check if any PMT accounts exist in localStorage
  const hasSavedAccounts=(()=>{
    try{for(let i=0;i<localStorage.length;i++){if((localStorage.key(i)||'').startsWith('pmt_account_'))return true;}return false;}
    catch{return false;}
  })();

  // Auto-load saved session on start
  useEffect(()=>{
    try{
      // Only auto-login if there's an active session token
      const session=localStorage.getItem('pmt_session');
      if(session){
        const s=JSON.parse(session);
        if(s.address&&s.username){
          // Has active session — go to login screen to verify password
          setScreen('login');
          return;
        }
      }
      // Check old-style unencrypted wallet (backwards compat, no accounts system)
      const saved=localStorage.getItem('pmt_wallet');
      if(saved){
        const w=JSON.parse(saved);
        // Only auto-login old wallet if NO pmt_account_ keys exist
        let hasNewAccounts=false;
        for(let i=0;i<localStorage.length;i++){
          if((localStorage.key(i)||'').startsWith('pmt_account_')){hasNewAccounts=true;break;}
        }
        if(!hasNewAccounts&&w.address){
          setWallet({address:w.address,balance:'0.0000',network:'PMT Chain'});
          setIsDemo(false);
          setScreen('app');
        }
      }
    }catch{}
  },[]);

  const handleMetaMask=useCallback(({address,balance,network,username,privateKey,chainId})=>{
    setWallet({address,balance,network,username,privateKey,chainId});
    setIsDemo(false);
    setScreen('app');
    if(window.ethereum){
      window.ethereum.on('accountsChanged',async accs=>{
        if(!accs||accs.length===0){setWallet(null);setScreen('landing');}
        else{
          const balHex=await window.ethereum.request({method:'eth_getBalance',params:[accs[0],'latest']}).catch(()=>'0x0');
          setWallet(w=>({...w,address:accs[0],balance:(parseInt(balHex,16)/1e18).toFixed(4)}));
        }
      });
    }
  },[]);

  const selectContact=c=>{setActive(c);if(!msgs[c.address])setMsgs(p=>({...p,[c.address]:[]}))}

  const sendMsg=useCallback(input=>{
    if(!active)return;
    BLOCK++;
    const isVoice=typeof input==='object'&&input.type==='voice';
    const msg=(isVoice||isImage||isFile)
      ?{id:'u'+Date.now(),out:true,...input,
        time:now(),block:BLOCK,confirms:0,hash:rndHash(),pending:true}
      :{id:'u'+Date.now(),out:true,text:input,time:now(),block:BLOCK,confirms:0,hash:rndHash(),pending:true};
    setMsgs(p=>({...p,[active.address]:[...(p[active.address]||[]),msg]}));
    const isImage=typeof input==='object'&&input.type==='image';
    const isFile=typeof input==='object'&&input.type==='file';
    const preview=isVoice?'🎙 Voice message':isImage?'🖼 Image':isFile?('📄 '+input.fileName):input;
    setContacts(p=>p.map(c=>c.id===active.id?{...c,preview}:c));
    // Simulate confirms
    let c=0;
    const iv=setInterval(()=>{
      c++;
      setMsgs(p=>({...p,[active.address]:(p[active.address]||[]).map(m=>
        m.id===msg.id?{...m,confirms:c,pending:c===0}:m
      )}));
      if(c>=12)clearInterval(iv);
    },600);
    // Simulate reply after 2s (for some contacts)
    if([1,3].includes(active.id)){
      const replies=['Interesting! Tell me more.','Got it, checking now...','🔗 Transaction confirmed ✓','Agreed. Let\'s ship it.','What block did that confirm in?'];
      setTimeout(()=>{
        BLOCK++;
        const reply={id:'r'+Date.now(),out:false,text:replies[Math.floor(Math.random()*replies.length)],
          time:now(),block:BLOCK,confirms:0,hash:rndHash()};
        setMsgs(p=>({...p,[active.address]:[...(p[active.address]||[]),reply]}));
        setContacts(p=>p.map(c=>c.id===active.id?{...c,preview:reply.text}:c));
        let rc=0;const riv=setInterval(()=>{
          rc++;setMsgs(p=>({...p,[active.address]:(p[active.address]||[]).map(m=>
            m.id===reply.id?{...m,confirms:rc}:m)}));
          if(rc>=8)clearInterval(riv);
        },700);
      },1800+Math.random()*1500);
    }
  },[active]);

  const sendETH=useCallback(async(contact,amount)=>{
    BLOCK++;
    const txId='tx'+Date.now();
    const tx={id:txId,type:'tx',out:true,amount,coin:'PMT',time:now(),block:BLOCK,confirms:0,hash:rndHash(),pending:true};
    setMsgs(p=>({...p,[contact.address]:[...(p[contact.address]||[]),tx]}));
    setContacts(p=>p.map(c=>c.id===contact.id?{...c,preview:`◈ Sent ${amount} PMT`}:c));

    if(!isDemo&&wallet&&window.ethereum){
      // Real transaction via MetaMask
      try{
        const toAddr=contact.address;
        // Validate it's a full 42-char Ethereum address
        if(!/^0x[0-9a-fA-F]{40}$/.test(toAddr)){
          setMsgs(p=>({...p,[contact.address]:(p[contact.address]||[]).filter(m=>m.id!==txId)}));
          throw new Error('This contact has no valid wallet address. Please add their full 0x address first.');
        }
        // Convert amount to hex wei (1 PMT = 1e18 wei assuming 18 decimals)
        const weiHex='0x'+BigInt(Math.floor(parseFloat(amount)*1e18)).toString(16);
        const txHash=await window.ethereum.request({
          method:'eth_sendTransaction',
          params:[{from:wallet.address,to:toAddr,value:weiHex}]
        });
        // Update with real tx hash
        setMsgs(p=>({...p,[contact.address]:(p[contact.address]||[]).map(m=>
          m.id===txId?{...m,hash:txHash,pending:false,confirms:1}:m
        )}));
        return txHash;
      }catch(e){
        // Remove pending tx on error
        setMsgs(p=>({...p,[contact.address]:(p[contact.address]||[]).filter(m=>m.id!==txId)}));
        throw e;
      }
    } else {
      // Demo mode  -  simulate confirmation
      setTimeout(()=>setMsgs(p=>({...p,[contact.address]:(p[contact.address]||[]).map(m=>
        m.id===txId?{...m,confirms:3,pending:false}:m)})),2000);
      return null;
    }
  },[isDemo,wallet]);

  const addContact=({address,name})=>{
    const colors=['#a78bfa','#f59e0b','#34d399','#63d2ff','#f43f5e','#06b6d4'];
    const bgs=['#1e1b30','#2a1f0a','#0a2a1f','#0a1f2a','#2a0a14','#0a2028'];
    const i=contacts.length%colors.length;
    const c={id:Date.now(),address,name,avatar:name.slice(0,2).toUpperCase(),color:colors[i],bg:bgs[i],online:false,preview:'New contact'};
    setContacts(p=>[c,...p]);
    setActive(c);setMsgs(p=>({...p,[address]:[]}));
    setShowNew(false);
  };

  if(screen==='create') return <CreateWalletFlow onWallet={handleMetaMask} onBack={()=>setScreen('landing')}/>;
  if(screen==='import') return <ImportWalletFlow onWallet={handleMetaMask} onBack={()=>setScreen('landing')}/>;
  if(screen==='login') return <LoginScreen onLogin={handleMetaMask} onBack={()=>setScreen('landing')}/>;
  if(screen==='landing') return <Landing
    onDemo={()=>{setIsDemo(true);setScreen('app');}}
    onMetaMask={handleMetaMask}
    onCreateWallet={()=>setScreen('create')}
    onImportWallet={()=>setScreen('import')}
    onLogin={()=>setScreen('login')}
  />;

  return(
    <div style={{display:'grid',gridTemplateColumns:'260px 1fr',height:'100vh',overflow:'hidden'}}>
      <Sidebar contacts={contacts} activeId={active?.id} onSelect={selectContact} onNew={()=>setShowNew(true)} onProfile={()=>setShowProfile(true)} onLogout={handleLogout} wallet={wallet} isDemo={isDemo} profile={profile}/>
      {active
        ? <ChatPanel contact={active} messages={msgs[active.address]||[]} onSend={sendMsg} onSendETH={sendETH} isDemo={isDemo}/>
        : <Empty onNew={()=>setShowNew(true)}/>}
      {showNew&&<NewChatModal onClose={()=>setShowNew(false)} onAdd={addContact}/>}
      {showProfile&&<ProfileModal profile={{...profile,address:wallet?.address}} onClose={()=>setShowProfile(false)} onSave={saveProfile}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
