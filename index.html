<script>
// Override window.ethereum to use real MetaMask, not TronLink
(function(){
  function fixProvider(){
    if(window.ethereum && window.ethereum.providers && window.ethereum.providers.length > 0){
      var real = window.ethereum.providers.find(function(p){ return p.isMetaMask && !p.isTronLink; });
      if(real && real !== window.ethereum){
        try{ Object.defineProperty(window,'ethereum',{get:function(){return real;},configurable:true}); }catch(e){}
      }
    }
  }
  // Fix immediately
  fixProvider();
  // Also fix after wallet extensions inject
  setTimeout(fixProvider, 100);
  setTimeout(fixProvider, 500);
  setTimeout(fixProvider, 1000);
  // Listen for injection events
  window.addEventListener('ethereum#initialized', fixProvider);
})();
</script>

<script>
// EIP-6963: Listen for wallet announcements - bypasses window.ethereum hijacking
window.__eip6963Providers = [];
window.addEventListener('eip6963:announceProvider', function(e){
  window.__eip6963Providers.push(e.detail);
  console.log('EIP-6963 wallet announced:', e.detail.info?.name);
});
// Request wallets to announce themselves
window.dispatchEvent(new Event('eip6963:requestProvider'));
// Also override window.ethereum early to prefer MetaMask
setTimeout(function(){
  if(window.ethereum?.providers?.length){
    var real = window.ethereum.providers.find(function(p){return p.isMetaMask&&!p.isTronLink;});
    if(real){
      try{Object.defineProperty(window,'ethereum',{get:function(){return real;},configurable:true});}catch(e){}
    }
  }
}, 200);
</script>

<script>
window.PMTAuth={
  // Simple password hash using Web Crypto SHA-256
  hashPassword:async function(password,salt){
    salt=salt||Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');
    const enc=new TextEncoder();
    const key=await crypto.subtle.importKey('raw',enc.encode(password),{name:'PBKDF2'},false,['deriveBits']);
    const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:enc.encode(salt),iterations:100000,hash:'SHA-256'},key,256);
    const hash=Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
    return {hash,salt};
  },
  verifyPassword:async function(password,hash,salt){
    const result=await this.hashPassword(password,salt);
    return result.hash===hash;
  },
  // Encrypt wallet data with password
  encryptWallet:async function(walletData,password){
    const enc=new TextEncoder();
    const keyMat=await crypto.subtle.importKey('raw',enc.encode(password),{name:'PBKDF2'},false,['deriveKey']);
    const salt=crypto.getRandomValues(new Uint8Array(16));
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},keyMat,{name:'AES-GCM',length:256},false,['encrypt']);
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const data=enc.encode(JSON.stringify(walletData));
    const encrypted=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,data);
    const result={
      encrypted:Array.from(new Uint8Array(encrypted)).map(b=>b.toString(16).padStart(2,'0')).join(''),
      salt:Array.from(salt).map(b=>b.toString(16).padStart(2,'0')).join(''),
      iv:Array.from(iv).map(b=>b.toString(16).padStart(2,'0')).join('')
    };
    return JSON.stringify(result);
  },
  decryptWallet:async function(encryptedStr,password){
    const {encrypted,salt,iv}=JSON.parse(encryptedStr);
    const enc=new TextEncoder();
    const toBytes=hex=>new Uint8Array(hex.match(/.{2}/g).map(b=>parseInt(b,16)));
    const keyMat=await crypto.subtle.importKey('raw',enc.encode(password),{name:'PBKDF2'},false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:toBytes(salt),iterations:100000,hash:'SHA-256'},keyMat,{name:'AES-GCM',length:256},false,['decrypt']);
    const decrypted=await crypto.subtle.decrypt({name:'AES-GCM',iv:toBytes(iv)},key,toBytes(encrypted));
    return JSON.parse(new TextDecoder().decode(decrypted));
  }
};
</script>

function VoiceBubble({msg,isOut,contact}){
  const [playing,setPlaying]=useState(false);
  const [progress,setProgress]=useState(0);
  const audioRef=useRef(null);

  const toggle=()=>{
    if(!audioRef.current)return;
    if(playing){audioRef.current.pause();}
    else{audioRef.current.play();}
    setPlaying(!playing);
  };

  useEffect(()=>{
    const a=audioRef.current;
    if(!a)return;
    const onTime=()=>setProgress((a.currentTime/a.duration)*100||0);
    const onEnd=()=>{setPlaying(false);setProgress(0);};
    a.addEventListener('timeupdate',onTime);
    a.addEventListener('ended',onEnd);
    return()=>{a.removeEventListener('timeupdate',onTime);a.removeEventListener('ended',onEnd);};
  },[]);

  const bars=msg.waveform||Array.from({length:30},(_,i)=>0.2+Math.abs(Math.sin(i*0.8+(msg.id||0)))*0.8);
  const dur=msg.duration||0;
  const mins=Math.floor(dur/60);
  const secs=String(dur%60).padStart(2,'0');

  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:8,marginBottom:3,
      flexDirection:isOut?'row-reverse':'row',animation:'fadeIn .2s ease'}}>
      {!isOut&&<ProfilePic initials={contact?.avatar} avatarUrl={contact?.avatarUrl}
        color={contact?.color} bg={contact?.bg} size={26} fs={10}/>}
      <div style={{maxWidth:'280px',padding:'10px 14px',borderRadius:16,
        ...(isOut?{background:'#1a2a4a',border:'1px solid rgba(99,210,255,.15)',borderBottomRightRadius:4}
                 :{background:'var(--surface2)',border:'1px solid var(--border)',borderBottomLeftRadius:4})}}>
        {msg.audioUrl&&<audio ref={audioRef} src={msg.audioUrl}/>}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          {/* Play button */}
          <button onClick={toggle} style={{width:36,height:36,borderRadius:'50%',
            background:isOut?'var(--accent)':'var(--accent2)',border:'none',
            display:'flex',alignItems:'center',justifyContent:'center',
            cursor:'pointer',flexShrink:0,fontSize:14,color:'#0a0c14'}}>
            {playing?'⏸':'▶'}
          </button>
          {/* Waveform */}
          <div style={{flex:1,display:'flex',alignItems:'center',gap:1.5,height:32,position:'relative'}}>
            {bars.map((h,i)=>{
              const pct=progress/100;
              const filled=i/bars.length<pct;
              return(
                <div key={i} style={{
                  width:2.5,borderRadius:2,flexShrink:0,
                  height:Math.max(3,h*28)+'px',
                  background:filled
                    ?(isOut?'var(--accent)':'var(--accent2)')
                    :'rgba(255,255,255,0.15)',
                  transition:'background .1s'
                }}/>
              );
            })}
          </div>
          {/* Duration */}
          <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)',flexShrink:0}}>
            {mins}:{secs}
          </span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6,marginTop:6,flexWrap:'wrap'}}>
          <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)'}}>{msg.time}</span>
          <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--accent2)',opacity:.7}}>{msg.hash}</span>
          <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--accent3)'}}>✓{msg.confirms||0}</span>
        </div>
      </div>
    </div>
  );
}

            Download

              borderRadius:8,width:36,height:36,color:'var(--text)',fontSize:18,cursor:'pointer',

function FileBubble({msg,isOut,contact}){

  return(
    <div style={{display:'flex',alignItems:'flex-end',gap:8,marginBottom:3,flexDirection:isOut?'row-reverse':'row',animation:'fadeIn .2s ease'}}>

                 :{background:'var(--surface2)',border:'1px solid var(--border)',borderBottomLeftRadius:4})}}>

          <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)'}}>{msg.time}</span>
          <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--accent2)',opacity:.7}}>{msg.hash}</span>
          {msg.block&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',opacity:.6}}>#{(msg.block||0).toLocaleString()}</span>}
          <span style={{fontFamily:'var(--mono)',fontSize:9,color:msg.confirms===0?'var(--muted)':msg.confirms<6?'var(--accent)':'var(--accent3)'}}>
            {msg.pending?'⏳':('✓'+msg.confirms)}
          </span>
        </div>
      </div>
    </div>
  );
}

function BlockStrip({blockNum}){
  const [blocks,setBlocks]=useState(()=>
    Array.from({length:5},(_,i)=>({num:(blockNum||BLOCK)-i,txs:Math.floor(Math.random()*200)+50}))
  );
  useEffect(()=>{
    const id=setInterval(()=>setBlocks(p=>{
      const b={num:p[0].num+1,txs:Math.floor(Math.random()*200)+50};
      return[b,...p.slice(0,4)];
    }),12000);
    return()=>clearInterval(id);
  },[]);
  return(
    <div style={{background:'var(--panel)',borderTop:'1px solid var(--border)',padding:'5px 18px',
      display:'flex',alignItems:'center',gap:16,overflowX:'auto',flexShrink:0}}>
      {blocks.map((b,i)=>(
        <div key={b.num} style={{display:'flex',alignItems:'center',gap:5,fontFamily:'var(--mono)',fontSize:10,
          color:'var(--muted)',whiteSpace:'nowrap',flexShrink:0,opacity:i===0?1:Math.max(0.2,0.7-i*.15)}}>
          <span style={{color:'var(--accent)'}}>#{b.num.toLocaleString()}</span>
          <span style={{opacity:.4}}>·</span>
          <span>{b.txs} txs</span>
          {i===0&&<><span style={{opacity:.4}}>·</span><span>{(Math.random()*20+5).toFixed(1)} gwei</span></>}
        </div>
      ))}
    </div>
  );
}

function SendModal({contact,onClose,onSend,isDemo}){
  const [amount,setAmount]=useState('');
  const [err,setErr]=useState(null);
  const [sending,setSending]=useState(false);
  const [txHash,setTxHash]=useState(null);

  const go=async()=>{
    if(!parseFloat(amount)||parseFloat(amount)<=0)return setErr('Enter a valid amount');
    setSending(true);setErr(null);
    try{
      const hash=await onSend(amount);
      if(hash){setTxHash(hash);}
      else{onClose();}
    }catch(e){
      if(e.code===4001)setErr('Transaction rejected in wallet.');
      else setErr(e.message||'Transaction failed');
      setSending(false);
    }
  };

  if(txHash) return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}
      onClick={onClose}>
      <div style={{background:'var(--panel)',border:'1px solid var(--border)',borderRadius:16,padding:'28px',width:340,
        display:'flex',flexDirection:'column',gap:14,alignItems:'center',textAlign:'center'}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:40}}>✅</div>
        <div style={{fontSize:17,fontWeight:600}}>Transaction Sent!</div>
        <div style={{fontSize:13,color:'var(--text2)'}}>Sent <strong>{amount} PMT</strong> to {contact.name}</div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--accent)',wordBreak:'break-all',
          background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px'}}>
          {txHash.slice(0,20)}...{txHash.slice(-10)}
        </div>
        <button onClick={onClose} style={{width:'100%',padding:11,background:'var(--accent)',border:'none',
          borderRadius:9,color:'#0a0c14',fontWeight:600,fontSize:13.5,cursor:'pointer'}}>Done</button>
      </div>
    </div>
  );

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}
      onClick={onClose}>
      <div style={{background:'var(--panel)',border:'1px solid var(--border)',borderRadius:16,padding:'28px',width:340,
        display:'flex',flexDirection:'column',gap:14}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:17,fontWeight:600}}>Send PMT</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>To: <span style={{color:'var(--accent)'}}>{contact.name}</span></div>
        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)'}}>{contact.address}</div>
        {!isDemo&&!/^0x[0-9a-fA-F]{40}$/.test(contact.address)&&(
          <div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',borderRadius:8,
            padding:'8px 12px',fontSize:12,color:'var(--danger)'}}>
            ⚠ This contact has a short/demo address. Edit the contact and enter their full wallet address (0x...40 chars) to send real PMT.
          </div>
        )}
        <div style={{display:'flex',alignItems:'center',gap:10,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'0 14px'}}>
          <input type="number" step=".001" min="0" placeholder="0.00" value={amount} onChange={e=>setAmount(e.target.value)}
            autoFocus style={{flex:1,background:'transparent',border:'none',outline:'none',color:'var(--text)',
              fontFamily:'var(--mono)',fontSize:22,padding:'12px 0',fontWeight:700}}/>
          <span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--muted)'}}>PMT</span>
        </div>
        <div style={{display:'flex',gap:6}}>
          {['0.001','0.01','0.1','0.5'].map(v=>(
            <button key={v} onClick={()=>setAmount(v)}
              style={{flex:1,padding:6,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,
                color:'var(--text2)',fontFamily:'var(--mono)',fontSize:11,cursor:'pointer'}}>{v}</button>
          ))}
        </div>
        {err&&<div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',borderRadius:8,
          padding:'8px 12px',fontSize:12,color:'var(--danger)'}}>{err}</div>}
        <div style={{display:'flex',gap:10}}>
          <button onClick={onClose} disabled={sending} style={{flex:1,padding:10,background:'transparent',border:'1px solid var(--border)',
            borderRadius:9,color:'var(--text2)',fontSize:13.5,cursor:'pointer'}}>Cancel</button>
          <button onClick={go} disabled={sending||!amount} style={{flex:2,padding:10,background:'var(--accent3)',border:'none',borderRadius:9,
            color:'#0a0c14',fontWeight:600,fontSize:13.5,cursor:sending?'default':'pointer',opacity:sending?0.7:1}}>
            {sending?'Confirm in wallet...':`Send ${amount||'0'} PMT`}

        </div>

          {isDemo?'Demo mode  -  no real transaction':'Transaction will be sent on PMT Chain'}

function ProfileModal({profile,onClose,onSave}){
  const [name,setName]=useState(profile.name||'');
  const [bio,setBio]=useState(profile.bio||'');
  const [avatar,setAvatar]=useState(profile.avatarUrl||null);
  const [dragging,setDragging]=useState(false);
  const fileRef=useRef(null);

  const handleFile=file=>{
    if(!file||!file.type.startsWith('image/'))return;
    const r=new FileReader();
    r.onload=e=>setAvatar(e.target.result);
    r.readAsDataURL(file);
  };

  const onDrop=e=>{
    e.preventDefault();setDragging(false);
    handleFile(e.dataTransfer.files[0]);
  };

  const save=()=>{
    onSave({name:name.trim()||profile.name,bio:bio.trim(),avatarUrl:avatar});
    onClose();
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',display:'flex',alignItems:'center',
      justifyContent:'center',zIndex:200}} onClick={onClose}>
      <div style={{background:'var(--panel)',border:'1px solid var(--border)',borderRadius:18,padding:32,

        </div>

        {/* Avatar upload */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
          <div
            onDragOver={e=>{e.preventDefault();setDragging(true)}}
            onDragLeave={()=>setDragging(false)}
            onDrop={onDrop}
            onClick={()=>fileRef.current.click()}
            style={{width:100,height:100,borderRadius:'50%',cursor:'pointer',position:'relative',
              border:`2px dashed ${dragging?'var(--accent)':'var(--border)'}`,
              background:avatar?'transparent':'var(--surface)',
              display:'flex',alignItems:'center',justifyContent:'center',
              overflow:'hidden',transition:'border-color .2s'}}>
            {avatar
              ? <img src={avatar} style={{width:'100%',height:'100%',objectFit:'cover'}} alt="avatar"/>
              : <div style={{textAlign:'center',color:'var(--muted)'}}>
                  <div style={{fontSize:28}}>📷</div>
                  <div style={{fontSize:10,marginTop:4,fontFamily:'var(--mono)'}}>UPLOAD</div>
                </div>
            }
            {/* Hover overlay */}
            <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.45)',display:'flex',
              alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity .2s',borderRadius:'50%'}}
              onMouseEnter={e=>e.currentTarget.style.opacity=1}
              onMouseLeave={e=>e.currentTarget.style.opacity=0}>
              <span style={{color:'#fff',fontSize:11,fontFamily:'var(--mono)'}}>CHANGE</span>
            </div>
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}}
            onChange={e=>handleFile(e.target.files[0])}/>
          <div style={{fontSize:11,color:'var(--muted)'}}>Click or drag & drop an image</div>
          {avatar&&(
            <button onClick={()=>setAvatar(null)}
              style={{fontSize:11,color:'var(--danger)',background:'none',border:'none',cursor:'pointer'}}>
              Remove photo
            </button>
          )}
        </div>

        {/* Name */}
        <div>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px',marginBottom:5}}>DISPLAY NAME</div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name or ENS..."
            style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:9,
              padding:'10px 13px',color:'var(--text)',fontFamily:'var(--sans)',fontSize:13.5,outline:'none'}}/>
        </div>

        {/* Bio */}
        <div>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px',marginBottom:5}}>

          </div>

            placeholder="Tell people about yourself..."
            rows={3}
            style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:9,
              padding:'10px 13px',color:'var(--text)',fontFamily:'var(--sans)',fontSize:13.5,outline:'none',
              resize:'none',lineHeight:1.5}}/>
        </div>

        {/* Wallet address (read-only) - profile is tied to this address */}
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:9,padding:'10px 13px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px',marginBottom:4}}>

          <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',wordBreak:'break-all'}}>

              borderRadius:9,color:'#0a0c14',fontWeight:600,fontSize:13.5,cursor:'pointer'}}>Save Profile</button>
        </div>
      </div>
    </div>
  );

  const [showSend,setShowSend]=useState(false);
  const [showAttach,setShowAttach]=useState(false);
  const [recording,setRecording]=useState(false);
  const fileInputRef=useRef(null);
  const fileAcceptRef=useRef('*');
  const [recordSeconds,setRecordSeconds]=useState(0);
  const [recorderError,setRecorderError]=useState(null);
  const bottomRef=useRef(null);
  const inputRef=useRef(null);
  const mediaRecRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const waveformRef=useRef([]);

  useEffect(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),[messages]);
  useEffect(()=>{setText('');inputRef.current?.focus();setShowAttach(false);},[contact?.id]);
  useEffect(()=>{
    if(!showAttach)return;
    const close=e=>{
      if(!e.target.closest('[data-attach]'))setShowAttach(false);
    };
    setTimeout(()=>document.addEventListener('click',close),0);
    return()=>document.removeEventListener('click',close);
  },[showAttach]);

  const send=()=>{const t=text.trim();if(!t)return;onSend(t);setText('');};

  const formatSize=bytes=>{
    if(bytes<1024)return bytes+'B';
    if(bytes<1024*1024)return (bytes/1024).toFixed(1)+'KB';
    return (bytes/(1024*1024)).toFixed(1)+'MB';
  };

  const openFilePicker=(accept)=>{
    fileAcceptRef.current=accept;
    fileInputRef.current.accept=accept;
    fileInputRef.current.click();
  };

  const handleFileChosen=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const url=URL.createObjectURL(file);
    const isImage=file.type.startsWith('image/');
    onSend({
      type:isImage?'image':'file',
      fileUrl:url,
      fileName:file.name,
      fileSize:formatSize(file.size),
      mimeType:file.type,
    });
    e.target.value='';
  };
  const key=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};

  const startRecording=async()=>{
    setRecorderError(null);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream);
      chunksRef.current=[];
      waveformRef.current=[];
      // Analyse audio for waveform
      const ctx=new (window.AudioContext||window.webkitAudioContext)();
      const src=ctx.createMediaStreamSource(stream);
      const analyser=ctx.createAnalyser();
      analyser.fftSize=64;
      src.connect(analyser);
      const dataArr=new Uint8Array(analyser.frequencyBinCount);
      const captureWave=()=>{
        analyser.getByteFrequencyData(dataArr);
        const avg=dataArr.reduce((a,b)=>a+b,0)/dataArr.length/255;
        waveformRef.current.push(avg);
      };
      mr.ondataavailable=e=>chunksRef.current.push(e.data);
      mr.onstop=()=>{
        stream.getTracks().forEach(t=>t.stop());
        ctx.close();
        const blob=new Blob(chunksRef.current,{type:'audio/webm'});
        const url=URL.createObjectURL(blob);
        const dur=recordSeconds;
        // Generate 30 waveform bars from captured data
        const raw=waveformRef.current;
        const bars=Array.from({length:30},(_,i)=>{
          const idx=Math.floor(i/30*raw.length);
          return Math.max(0.05, raw[idx]||0.1);
        });
        onSend({type:'voice',audioUrl:url,duration:dur,waveform:bars});
        setRecordSeconds(0);
      };
      mr.start(100);
      mediaRecRef.current=mr;
      setRecording(true);
      let s=0;
      timerRef.current=setInterval(()=>{
        s++;
        setRecordSeconds(s);
        captureWave();
        if(s>=120){stopRecording();}  // 2 min max
      },1000);
    }catch(e){
      setRecorderError(e.name==='NotAllowedError'?'Microphone access denied':'Could not access microphone');
    }
  };

  const stopRecording=()=>{
    clearInterval(timerRef.current);
    if(mediaRecRef.current&&mediaRecRef.current.state!=='inactive'){
      mediaRecRef.current.stop();
    }
    setRecording(false);
  };

  const cancelRecording=()=>{
    clearInterval(timerRef.current);
    if(mediaRecRef.current&&mediaRecRef.current.state!=='inactive'){
      mediaRecRef.current.stream?.getTracks().forEach(t=>t.stop());
      mediaRecRef.current.ondataavailable=null;
      mediaRecRef.current.onstop=null;
      mediaRecRef.current.stop();
    }
    setRecording(false);
    setRecordSeconds(0);
  };
  return(
    <div style={{display:'flex',flexDirection:'column',background:'var(--bg)',height:'100%',overflow:'hidden'}}>
      {/* Header */}
      <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',background:'var(--panel)',
        display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <ProfilePic initials={contact.avatar} avatarUrl={contact.avatarUrl} color={contact.color} bg={contact.bg} online={contact.online}/>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600}}>{contact.name}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--accent)',opacity:.8,
            whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{contact.address}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',
          background:'rgba(99,210,255,.07)',border:'1px solid rgba(99,210,255,.18)',
          borderRadius:20,fontFamily:'var(--mono)',fontSize:10,color:'var(--accent)',flexShrink:0}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:'var(--accent3)',animation:'pulse 2s infinite'}}/>
          PMT Chain
        </div>
        <button onClick={()=>setShowSend(true)}
          style={{padding:'5px 10px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,
            color:'var(--text2)',fontSize:12,cursor:'pointer',flexShrink:0}}>↑ PMT</button>
      </div>
      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'16px 20px',display:'flex',flexDirection:'column',gap:2}}>
        <div style={{textAlign:'center',fontFamily:'var(--mono)',fontSize:10,color:'var(--accent2)',margin:'6px 0',opacity:.7}}>
          🔗 E2E encryption handshake verified · block #{(BLOCK-50).toLocaleString()}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0 8px',
          fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)',letterSpacing:'1px'}}>
          <div style={{flex:1,height:1,background:'var(--border)'}}/>TODAY
          <div style={{flex:1,height:1,background:'var(--border)'}}/>
        </div>
        {messages.map(m=>(
          <Bubble key={m.id} msg={m} isOut={m.out} contact={contact}/>
        ))}
        <div ref={bottomRef}/>
      </div>
      <BlockStrip blockNum={BLOCK}/>
      {/* Input */}
      <div style={{padding:'12px 18px',borderTop:'1px solid var(--border)',background:'var(--panel)',
        display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
        {recorderError&&(
          <div style={{fontSize:11,color:'var(--danger)',fontFamily:'var(--mono)',textAlign:'center'}}>{recorderError}</div>
        )}
        {recording?(
          /* Recording UI */
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <button onClick={cancelRecording}
              style={{width:38,height:38,background:'var(--surface)',border:'1px solid var(--border)',
                borderRadius:9,color:'var(--danger)',fontSize:16,display:'flex',alignItems:'center',
                justifyContent:'center',flexShrink:0,cursor:'pointer'}}>✕</button>
            <div style={{flex:1,background:'var(--surface)',border:'1px solid rgba(248,113,113,.4)',
              borderRadius:12,display:'flex',alignItems:'center',padding:'0 14px',gap:10,height:42}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:'var(--danger)',
                animation:'pulse 1s infinite',flexShrink:0}}/>
              <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--danger)'}}>
                {String(Math.floor(recordSeconds/60)).padStart(2,'0')}:{String(recordSeconds%60).padStart(2,'0')}
              </span>
              <span style={{fontSize:11,color:'var(--muted)',flex:1}}>Recording... tap stop to send</span>
            </div>
            <button onClick={stopRecording}
              style={{width:40,height:40,background:'var(--danger)',border:'none',
                borderRadius:10,color:'#fff',fontSize:16,display:'flex',alignItems:'center',
                justifyContent:'center',flexShrink:0,cursor:'pointer'}}>■</button>
          </div>
        ):(
          /* Normal input UI */
          <div style={{display:'flex',alignItems:'flex-end',gap:8}}>
            <input ref={fileInputRef} type="file" style={{display:'none'}} onChange={handleFileChosen}/>
            <div style={{position:'relative'}}>
              <button onClick={()=>setShowAttach(v=>!v)}
                style={{width:38,height:38,background:showAttach?'var(--surface2)':'var(--surface)',
                  border:`1px solid ${showAttach?'var(--accent)':'var(--border)'}`,
                  borderRadius:9,color:showAttach?'var(--accent)':'var(--muted)',fontSize:16,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  flexShrink:0,cursor:'pointer',transition:'all .15s'}}>📎</button>
              {showAttach&&<AttachMenu
                onImage={accept=>openFilePicker(accept)}
                onFile={accept=>openFilePicker(accept)}
                onClose={()=>setShowAttach(false)}/>}
            </div>
            <div style={{flex:1,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,
              display:'flex',alignItems:'flex-end',padding:'0 12px'}}>
              <textarea ref={inputRef} rows={1} value={text} onChange={e=>setText(e.target.value)} onKeyDown={key}
                placeholder={`Message ${contact.name} (encrypted on-chain)...`}
                style={{flex:1,background:'transparent',border:'none',outline:'none',color:'var(--text)',
                  fontFamily:'var(--sans)',fontSize:13.5,padding:'10px 0',resize:'none',lineHeight:1.5,maxHeight:120}}/>
              <span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--accent)',opacity:.6,paddingBottom:11}}>🔒 E2E</span>
            </div>
            {text.trim()?(
              <button onClick={send}
                style={{width:40,height:40,background:'var(--accent)',border:'none',
                  borderRadius:10,color:'#0a0c14',fontSize:16,display:'flex',alignItems:'center',
                  justifyContent:'center',flexShrink:0,cursor:'pointer',transition:'all .15s'}}>➤</button>
            ):(
              <button onClick={startRecording}
                style={{width:40,height:40,background:'var(--surface)',border:'1px solid var(--border)',
                  borderRadius:10,color:'var(--accent2)',fontSize:18,display:'flex',alignItems:'center',
                  justifyContent:'center',flexShrink:0,cursor:'pointer',transition:'all .15s'}}
                title="Hold to record voice message">🎙</button>
            )}
          </div>
        )}
      </div>
      {showSend&&<SendModal contact={contact} onClose={()=>setShowSend(false)} onSend={amt=>onSendETH(contact,amt)} isDemo={isDemo}/>}
    </div>
  );
}

/* ── Create Wallet Flow ── */
function CreateWalletFlow({onWallet,onBack}){
  const [step,setStep]=useState('generate'); // generate | backup | verify | password
  const [wallet,setWallet]=useState(null);
  const [revealed,setRevealed]=useState(false);
  const [verifyWords,setVerifyWords]=useState({});
  const [checkIdxs,setCheckIdxs]=useState([]);
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [confirmPwd,setConfirmPwd]=useState('');
  const [pwdErr,setPwdErr]=useState(null);
  const [copied,setCopied]=useState(false);

  useEffect(()=>{
    // Generate wallet using PMTCrypto
    window.PMTCrypto.createWallet().then(w=>{
      setWallet({
        address:w.address,
        privateKey:w.privateKey,
        mnemonic:w.mnemonic,
        words:w.words,
      });
    });
    // Pick 3 random word indices to verify
    const idxs=[];
    while(idxs.length<3){
      const n=Math.floor(Math.random()*12);
      if(!idxs.includes(n))idxs.push(n);
    }
    setCheckIdxs(idxs.sort((a,b)=>a-b));
  },[]);

  const copyPhrase=()=>{
    if(!wallet)return;
    navigator.clipboard.writeText(wallet.mnemonic).then(()=>{
      setCopied(true);setTimeout(()=>setCopied(false),2000);
    });
  };

  const verifyOk=wallet&&checkIdxs.every(i=>
    (verifyWords[i]||'').trim().toLowerCase()===wallet.words[i].toLowerCase()
  );

  const [finishing,setFinishing]=useState(false);
  const finish=async()=>{
    if(!username.trim())return setPwdErr('Please choose a username');
    if(username.trim().length<3)return setPwdErr('Username must be at least 3 characters');
    if(password.length<8)return setPwdErr('Password must be at least 8 characters');
    if(password!==confirmPwd)return setPwdErr('Passwords do not match');
    setPwdErr(null);
    setFinishing(true);
    try{
      const walletData={address:wallet.address,privateKey:wallet.privateKey,mnemonic:wallet.mnemonic};
      // Encrypt wallet with password
      const encrypted=await window.PMTAuth.encryptWallet(walletData,password);
      // Hash password for login verification
      const {hash,salt}=await window.PMTAuth.hashPassword(password);
      const account={
        username:username.trim(),
        address:wallet.address,
        passwordHash:hash,
        passwordSalt:salt,
        encryptedWallet:encrypted,
        createdAt:Date.now(),
      };
      // Store by username (lowercase) for login lookup
      const key='pmt_account_'+username.trim().toLowerCase();
      localStorage.setItem(key,JSON.stringify(account));
      // Also store current session (unencrypted for active session only)
      localStorage.setItem('pmt_session',JSON.stringify({username:username.trim(),address:wallet.address}));
      onWallet({address:wallet.address,balance:'0.0000',network:'PMT Chain',chainId:'0x46c52',isCreated:true,username:username.trim()});
    }catch(e){
      setPwdErr('Failed to secure wallet: '+e.message);
      setFinishing(false);
    }
  };

  if(!wallet)return(
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{color:'var(--muted)',fontFamily:'var(--mono)',fontSize:12}}>Generating wallet...</div>
    </div>
  );

  const steps=[{k:'generate',label:'Generate'},{k:'backup',label:'Backup'},{k:'verify',label:'Verify'},{k:'secure',label:'Secure'}];
  const stepIdx={generate:0,backup:1,verify:2,password:3}[step];

  return(
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
      background:'var(--bg)',padding:20,overflowY:'auto'}}>
      <div style={{width:'100%',maxWidth:480,background:'var(--panel)',border:'1px solid var(--border)',
        borderRadius:16,padding:'28px 28px 24px',display:'flex',flexDirection:'column',gap:20,
        animation:'slideUp .3s ease'}}>

        {/* Progress bar */}
        <div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            {steps.map((s,i)=>(
              <div key={s.k} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flex:1}}>
                <div style={{width:28,height:28,borderRadius:'50%',
                  background:i<=stepIdx?'var(--accent)':'var(--surface)',
                  border:`1px solid ${i<=stepIdx?'var(--accent)':'var(--border)'}`,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:11,fontWeight:600,color:i<=stepIdx?'#0a0c14':'var(--muted)',
                  transition:'all .3s'}}>{i<stepIdx?'v':i+1}</div>
                <div style={{fontSize:9,color:i<=stepIdx?'var(--accent)':'var(--muted)',
                  fontFamily:'var(--mono)',letterSpacing:'.5px'}}>{s.label.toUpperCase()}</div>
              </div>
            ))}
          </div>
          <div style={{height:2,background:'var(--surface)',borderRadius:2}}>
            <div style={{height:'100%',borderRadius:2,background:'var(--accent)',
              width:`${(stepIdx/3)*100}%`,transition:'width .4s ease'}}/>
          </div>
        </div>

        {/* Step: Generate */}
        {step==='generate'&&(
          <>
            <div>
              <div style={{fontSize:17,fontWeight:600,marginBottom:6}}>Your new wallet</div>
              <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>
                A unique 12-word seed phrase has been generated. This phrase is the only key to your wallet  -  store it safely offline.
              </div>
            </div>
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:16}}>
              <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted)',marginBottom:10,letterSpacing:'1px'}}>WALLET ADDRESS</div>
              <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',wordBreak:'break-all'}}>{wallet.address}</div>
            </div>
            <div style={{background:'rgba(248,113,113,.07)',border:'1px solid rgba(248,113,113,.2)',
              borderRadius:10,padding:'12px 14px',fontSize:12.5,color:'var(--danger)',lineHeight:1.6}}>
              ! Never share your seed phrase with anyone. PMT-Chat staff will never ask for it.
            </div>
            <button onClick={()=>setStep('backup')}
              style={{padding:'13px',background:'var(--accent)',border:'none',borderRadius:10,
                color:'#0a0c14',fontWeight:600,fontSize:14,cursor:'pointer'}}>
              Continue  -  Back Up My Phrase
            </button>
            <button onClick={onBack}
              style={{padding:'10px',background:'transparent',border:'1px solid var(--border)',borderRadius:10,
                color:'var(--muted)',fontSize:13,cursor:'pointer'}}>Back</button>
          </>
        )}

        {/* Step: Backup seed phrase */}
        {step==='backup'&&(
          <>
            <div>
              <div style={{fontSize:17,fontWeight:600,marginBottom:6}}>Save your seed phrase</div>
              <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>
                Write these 12 words on paper in order. Keep it somewhere safe  -  you'll need it to recover your wallet.
              </div>
            </div>
            {/* Seed phrase grid */}
            <div style={{position:'relative',borderRadius:12,overflow:'hidden'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,
                filter:revealed?'none':'blur(10px)',userSelect:revealed?'text':'none',
                transition:'filter .3s'}}>
                {wallet.words.map((w,i)=>(
                  <div key={i} style={{background:'var(--surface)',border:'1px solid var(--border)',
                    borderRadius:8,padding:'8px 10px',display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--muted)',minWidth:16}}>{i+1}</span>
                    <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:600,color:'var(--text)'}}>{w}</span>
                  </div>
                ))}
              </div>
              {!revealed&&(
                <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
                  alignItems:'center',justifyContent:'center',gap:10,
                  background:'rgba(10,12,20,.6)',backdropFilter:'blur(2px)',cursor:'pointer'}}
                  onClick={()=>setRevealed(true)}>
                  <div style={{fontSize:28}}>*</div>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>Tap to reveal seed phrase</div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>Make sure no one is watching</div>
                </div>
              )}
            </div>
            {revealed&&(
              <button onClick={copyPhrase}
                style={{padding:'10px',background:'var(--surface)',border:'1px solid var(--border)',
                  borderRadius:9,color:copied?'var(--accent3)':'var(--text2)',fontSize:13,cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                {copied?'Copied!':'Copy to clipboard'}
              </button>
            )}
            <button onClick={()=>setStep('verify')} disabled={!revealed}
              style={{padding:'13px',background:revealed?'var(--accent)':'var(--surface)',
                border:revealed?'none':'1px solid var(--border)',borderRadius:10,
                color:revealed?'#0a0c14':'var(--muted)',fontWeight:600,fontSize:14,
                cursor:revealed?'pointer':'default'}}>
              I have saved my seed phrase
            </button>
          </>
        )}

        {/* Step: Verify */}
        {step==='verify'&&(
          <>
            <div>
              <div style={{fontSize:17,fontWeight:600,marginBottom:6}}>Verify your backup</div>
              <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>
                Enter the missing words from your seed phrase to confirm you've backed it up correctly.
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {checkIdxs.map(i=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:12,
                  background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px'}}>
                  <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted)',
                    minWidth:24,textAlign:'right'}}>#{i+1}</div>
                  <input
                    placeholder={`Word ${i+1}`}
                    value={verifyWords[i]||''}
                    onChange={e=>setVerifyWords(v=>({...v,[i]:e.target.value}))}
                    style={{flex:1,background:'transparent',border:'none',outline:'none',
                      fontFamily:'var(--mono)',fontSize:13,color:'var(--text)'}}
                  />
                  <div style={{fontSize:14}}>
                    {verifyWords[i]
                      ? verifyWords[i].trim().toLowerCase()===wallet.words[i].toLowerCase()
                        ? 'OK' : 'X'
                      : ''}
                  </div>
                </div>
              ))}
            </div>
            <button onClick={()=>setStep('password')} disabled={!verifyOk}
              style={{padding:'13px',background:verifyOk?'var(--accent)':'var(--surface)',
                border:verifyOk?'none':'1px solid var(--border)',borderRadius:10,
                color:verifyOk?'#0a0c14':'var(--muted)',fontWeight:600,fontSize:14,
                cursor:verifyOk?'pointer':'default'}}>
              {verifyOk?'Verification passed':'Enter the correct words to continue'}
            </button>
          </>
        )}

        {/* Step: Set username + password */}
        {step==='password'&&(
          <>
            <div>
              <div style={{fontSize:17,fontWeight:600,marginBottom:6}}>Create your account</div>
              <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>
                Choose a username and password. Next time you open PMT-Chat, just log in — no need to import your wallet again.
              </div>
            </div>
            <div>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px',marginBottom:5}}>USERNAME</div>
              <input placeholder="Choose a username" value={username}
                onChange={e=>{setUsername(e.target.value);setPwdErr(null);}}
                style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',
                  borderRadius:9,padding:'10px 13px',color:'var(--text)',fontFamily:'var(--sans)',
                  fontSize:14,outline:'none'}}/>
            </div>
            {[['Password','password',password,setPassword],['Confirm Password','confirmPwd',confirmPwd,setConfirmPwd]].map(([label,name,val,set])=>(
              <div key={name}>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px',marginBottom:5}}>
                  {label.toUpperCase()}
                </div>
                <input type="password" placeholder="********" value={val}
                  onChange={e=>{set(e.target.value);setPwdErr(null);}}
                  style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',
                    borderRadius:9,padding:'10px 13px',color:'var(--text)',fontFamily:'var(--sans)',
                    fontSize:14,outline:'none'}}/>
              </div>
            ))}
            {/* Password strength */}
            {password.length>0&&(
              <div>
                <div style={{display:'flex',gap:3,marginBottom:4}}>
                  {[0,1,2,3].map(i=>{
                    const strength=password.length>=8?(password.length>=12?4:3):(password.length>=6?2:1);
                    const colors=['var(--danger)','var(--danger)','#f59e0b','var(--accent3)','var(--accent3)'];
                    return <div key={i} style={{flex:1,height:3,borderRadius:2,
                      background:i<strength?colors[strength]:'var(--surface)'}}/>;
                  })}
                </div>
                <div style={{fontSize:11,color:'var(--muted)'}}>
                  {password.length>=12?'Strong':password.length>=8?'Good':'Too short (min 8 chars)'}
                </div>
              </div>
            )}
            {pwdErr&&(
              <div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',
                borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--danger)'}}>{pwdErr}</div>
            )}
            <button onClick={finish} disabled={!password||!confirmPwd||!username.trim()||finishing}
              style={{padding:'13px',background:'var(--accent)',border:'none',borderRadius:10,
                color:'#0a0c14',fontWeight:600,fontSize:14,cursor:finishing?'default':'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
              {finishing
                ?<><span style={{width:14,height:14,border:'2px solid rgba(0,0,0,.3)',borderTopColor:'#0a0c14',
                    borderRadius:'50%',display:'inline-block',animation:'spin .7s linear infinite'}}/>Securing wallet...</>
                :'Create Wallet'}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

/* ── Import Wallet Flow ── */
function ImportWalletFlow({onWallet,onBack}){
  const [step,setStep]=useState('choose'); // choose | enter | account
  const [mode,setMode]=useState('seed');
  const [input,setInput]=useState('');
  const [username,setUsername]=useState('');
  const [password,setPassword]=useState('');
  const [confirmPwd,setConfirmPwd]=useState('');
  const [err,setErr]=useState(null);
  const [pwdErr,setPwdErr]=useState(null);
  const [loading,setLoading]=useState(false);
  const [finishing,setFinishing]=useState(false);
  const [importedWallet,setImportedWallet]=useState(null);

  // Step 1: validate the seed/key and advance to account creation
  const verifyImport=async()=>{
    setErr(null);setLoading(true);
    try{
      const C=window.PMTCrypto;
      let w;
      if(mode==='seed'){
        const phrase=input.trim().toLowerCase();
        const words=phrase.split(/\s+/);
        if(words.length!==12&&words.length!==24)throw new Error('Seed phrase must be 12 or 24 words');
        w=C.importFromMnemonic(phrase);
      }else{
        w=C.importFromPrivateKey(input.trim());
      }
      setImportedWallet(w);
      setStep('account');
    }catch(e){
      setErr(e.message||'Import failed');
    }finally{setLoading(false);}
  };

  // Step 2: create account with username+password
  const finish=async()=>{
    if(!username.trim())return setPwdErr('Please choose a username');
    if(username.trim().length<3)return setPwdErr('Username must be at least 3 characters');
    if(password.length<8)return setPwdErr('Password must be at least 8 characters');
    if(password!==confirmPwd)return setPwdErr('Passwords do not match');
    setPwdErr(null);setFinishing(true);
    try{
      const walletData={
        address:importedWallet.address,
        privateKey:importedWallet.privateKey,
        mnemonic:importedWallet.mnemonic||null,
      };
      const encrypted=await window.PMTAuth.encryptWallet(walletData,password);
      const {hash,salt}=await window.PMTAuth.hashPassword(password);
      const account={
        username:username.trim(),
        address:importedWallet.address,
        passwordHash:hash,
        passwordSalt:salt,
        encryptedWallet:encrypted,
        createdAt:Date.now(),
      };
      const key='pmt_account_'+username.trim().toLowerCase();
      localStorage.setItem(key,JSON.stringify(account));
      localStorage.setItem('pmt_session',JSON.stringify({username:username.trim(),address:importedWallet.address}));
      onWallet({address:importedWallet.address,balance:'0.0000',network:'PMT Chain',
        chainId:'0x46c52',username:username.trim()});
    }catch(e){
      setPwdErr('Failed to secure wallet: '+e.message);
      setFinishing(false);
    }
  };

  return(
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
      background:'var(--bg)',padding:20,overflowY:'auto'}}>
      <div style={{width:'100%',maxWidth:460,background:'var(--panel)',border:'1px solid var(--border)',
        borderRadius:16,padding:'28px',display:'flex',flexDirection:'column',gap:18}}>

        {/* Header */}
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={step==='account'?()=>setStep('enter'):onBack}
            style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,
              width:32,height:32,color:'var(--muted)',cursor:'pointer',fontSize:13,
              display:'flex',alignItems:'center',justifyContent:'center'}}>Back</button>
          <div>
            <div style={{fontSize:17,fontWeight:600}}>
              {step==='account'?'Create your account':'Import Existing Wallet'}
            </div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:2,fontFamily:'var(--mono)'}}>
              {step==='choose'?'STEP 1 OF 2 - IMPORT':step==='enter'?'STEP 1 OF 2 - ENTER KEYS':'STEP 2 OF 2 - SECURE'}
            </div>
          </div>
        </div>

        {/* Progress */}
        <div style={{display:'flex',gap:6}}>
          {['Import','Secure'].map((label,i)=>{
            const active=(i===0&&(step==='choose'||step==='enter'))||(i===1&&step==='account');
            const done=(i===0&&step==='account');
            return(
              <div key={label} style={{flex:1,height:3,borderRadius:2,
                background:done?'var(--accent3)':active?'var(--accent)':'var(--surface)',
                transition:'background .3s'}}/>
            );
          })}
        </div>

        {/* Step: Choose method */}
        {step==='choose'&&(
          <>
            <p style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>
              Import your wallet using a seed phrase or private key, then set a username and password for quick login.
            </p>
            {[
              ['Seed Phrase (12 or 24 words)','Most common recovery method','seed'],
              ['Private Key','Import with a single private key','key'],
            ].map(([title,sub,m])=>(
              <button key={m} onClick={()=>{setMode(m);setStep('enter');}}
                style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',
                  background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,
                  cursor:'pointer',textAlign:'left'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--accent)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                <div style={{width:40,height:40,borderRadius:10,background:'rgba(99,210,255,.1)',
                  border:'1px solid rgba(99,210,255,.2)',display:'flex',alignItems:'center',
                  justifyContent:'center',fontSize:18,flexShrink:0}}>
                  {m==='seed'?'S':'K'}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13.5,fontWeight:500,color:'var(--text)'}}>{title}</div>
                  <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{sub}</div>
                </div>
                <span style={{color:'var(--muted)',fontSize:16}}>›</span>
              </button>
            ))}
          </>
        )}

        {/* Step: Enter seed/key */}
        {step==='enter'&&(
          <>
            <button onClick={()=>setStep('choose')}
              style={{background:'none',border:'none',color:'var(--muted)',fontSize:12,
                cursor:'pointer',textAlign:'left',fontFamily:'var(--mono)',padding:0}}>
              Back to options
            </button>
            <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>
              {mode==='seed'
                ?'Enter your 12 or 24 word seed phrase, separated by spaces.'
                :'Enter your private key (starts with 0x, 66 characters).'}
            </div>
            <textarea rows={mode==='seed'?4:2}
              placeholder={mode==='seed'?'word1 word2 word3 ... word12':'0x...'}
              value={input} onChange={e=>{setInput(e.target.value);setErr(null);}}
              style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',
                borderRadius:10,padding:'12px 14px',color:'var(--text)',
                fontFamily:'var(--mono)',fontSize:12.5,outline:'none',resize:'none',lineHeight:1.7}}/>
            {err&&(
              <div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',
                borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--danger)'}}>{err}</div>
            )}
            <div style={{background:'rgba(248,113,113,.07)',border:'1px solid rgba(248,113,113,.2)',
              borderRadius:9,padding:'10px 14px',fontSize:12,color:'var(--danger)',lineHeight:1.5}}>
              Never enter your seed phrase on a site you do not trust.
            </div>
            <button onClick={verifyImport} disabled={!input.trim()||loading}
              style={{padding:'13px',background:'var(--accent)',border:'none',borderRadius:10,
                color:'#0a0c14',fontWeight:600,fontSize:14,cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                opacity:!input.trim()||loading?0.7:1}}>
              {loading
                ?<><span style={{width:14,height:14,border:'2px solid rgba(0,0,0,.3)',borderTopColor:'#0a0c14',
                    borderRadius:'50%',display:'inline-block',animation:'spin .7s linear infinite'}}/>Verifying...</>
                :'Continue'}
            </button>
          </>
        )}

        {/* Step: Create account */}
        {step==='account'&&(
          <>
            <div style={{background:'rgba(52,211,153,.08)',border:'1px solid rgba(52,211,153,.2)',
              borderRadius:10,padding:'10px 14px',fontSize:12,color:'var(--accent3)',lineHeight:1.5}}>
              Wallet imported successfully! Now create a username and password so you can log in quickly next time.
            </div>
            <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:9,padding:'10px 13px'}}>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px',marginBottom:3}}>WALLET ADDRESS</div>
              <div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent)',wordBreak:'break-all'}}>{importedWallet?.address}</div>
            </div>
            <div>
              <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px',marginBottom:5}}>USERNAME</div>
              <input placeholder="Choose a username" value={username}
                onChange={e=>{setUsername(e.target.value);setPwdErr(null);}}
                style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',
                  borderRadius:9,padding:'10px 13px',color:'var(--text)',fontFamily:'var(--sans)',fontSize:14,outline:'none'}}/>
            </div>
            {[['Password','password',password,setPassword],['Confirm Password','confirmPwd',confirmPwd,setConfirmPwd]].map(([label,name,val,set])=>(
              <div key={name}>
                <div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--muted)',letterSpacing:'1px',marginBottom:5}}>{label.toUpperCase()}</div>
                <input type="password" placeholder="password" value={val}
                  onChange={e=>{set(e.target.value);setPwdErr(null);}}
                  style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',
                    borderRadius:9,padding:'10px 13px',color:'var(--text)',fontFamily:'var(--sans)',fontSize:14,outline:'none'}}/>
              </div>
            ))}
            {password.length>0&&(
              <div>
                <div style={{display:'flex',gap:3,marginBottom:4}}>
                  {[0,1,2,3].map(i=>{
                    const s=password.length>=12?4:password.length>=8?3:password.length>=6?2:1;
                    const colors=['var(--danger)','var(--danger)','#f59e0b','var(--accent3)','var(--accent3)'];
                    return <div key={i} style={{flex:1,height:3,borderRadius:2,background:i<s?colors[s]:'var(--surface)'}}/>;
                  })}
                </div>
                <div style={{fontSize:11,color:'var(--muted)'}}>
                  {password.length>=12?'Strong':password.length>=8?'Good':'Too short (min 8 chars)'}
                </div>
              </div>
            )}
            {pwdErr&&(
              <div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.3)',
                borderRadius:8,padding:'8px 12px',fontSize:12,color:'var(--danger)'}}>{pwdErr}</div>
            )}
            <button onClick={finish} disabled={!username.trim()||!password||!confirmPwd||finishing}
              style={{padding:'13px',background:'var(--accent)',border:'none',borderRadius:10,
                color:'#0a0c14',fontWeight:600,fontSize:14,cursor:finishing?'default':'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                opacity:!username.trim()||!password||!confirmPwd||finishing?0.7:1}}>
              {finishing
                ?<><span style={{width:14,height:14,border:'2px solid rgba(0,0,0,.3)',borderTopColor:'#0a0c14',
                    borderRadius:'50%',display:'inline-block',animation:'spin .7s linear infinite'}}/>Securing wallet...</>
                :'Import & Create Account'}
            </button>
          </>
        )}
      </div>
    </div>
  );
